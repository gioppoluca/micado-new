services:
  traefik:
    image: traefik:v3.6.8
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.file.directory=/etc/traefik/dynamic
      - --entrypoints.web.address=:80
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./infrastructure/traefik/dynamic:/etc/traefik/dynamic:ro

  db:
    image: groonga/pgroonga:4.0.5-debian-16
    environment:
      POSTGRES_USER: ${POSTGRES_SUPERUSER}
      POSTGRES_PASSWORD: ${POSTGRES_SUPERPASS}
      KEYCLOAK_DB: ${KEYCLOAK_DB}
      KEYCLOAK_DB_USER: ${KEYCLOAK_DB_USER}
      KEYCLOAK_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      APP_DB: ${APP_DB}
      APP_DB_USER: ${APP_DB_USER}
      WEBLATE_DB: ${WEBLATE_DB}
      WEBLATE_DB_USER: ${WEBLATE_DB_USER}
      WEBLATE_DB_PASSWORD: ${WEBLATE_DB_PASSWORD}
      GITEA_DB: ${GITEA_DB}
      GITEA_DB_USER: ${GITEA_DB_USER}
      GITEA_DB_PASSWORD: ${GITEA_DB_PASSWORD}
      MICADO_APP_PASSWORD: ${MICADO_APP_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      UMAMI_DB_USER: ${UMAMI_DB_USER:-umami}
      UMAMI_DB_PASSWORD: ${UMAMI_DB_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init:/docker-entrypoint-initdb.d:ro
    labels:
      - traefik.enable=false
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${POSTGRES_SUPERUSER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  cache:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - cache_data:/data
    labels:
      - traefik.enable=false
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.5.3
    depends_on: [db]
    command:
      [
        "start",
        "--import-realm",
        "--proxy-headers",
        "xforwarded",
        "--http-enabled",
        "true",
      ]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_BOOTSTRAP_ADMIN_USERNAME}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_BOOTSTRAP_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://db:5432/${POSTGRES_DB}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KC_DB_SCHEMA: keycloak
      KC_HOSTNAME: auth.${BASE_DOMAIN}
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./infrastructure/keycloak/realms:/opt/keycloak/data/import:ro
      - ./infrastructure/keycloak/themes:/opt/keycloak/themes:ro
    labels:
      - traefik.enable=true
      - traefik.http.routers.keycloak.rule=Host(`auth.${BASE_DOMAIN}`)
      - traefik.http.routers.keycloak.entrypoints=web
      - traefik.http.services.keycloak.loadbalancer.server.port=8080

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    depends_on: 
      db:
        condition: service_healthy
      keycloak:
        condition: service_started
      umami-init:
        condition: service_completed_successfully
    environment:
      PORT: ${BACKEND_PORT}
      CORS_ORIGIN: ${CORS_ORIGIN}
      DB_HOST: db
      DB_PORT: 5432
      DBOS_DB_USER: ${DBOS_DB_USER}
      DBOS_DB_SCHEMA: ${DBOS_DB_SCHEMA}
      DBOS_SYSTEM_DATABASE_URL: postgres://${DBOS_DB_USER}:${MICADO_APP_PASSWORD}@db:5432/micado
      KEYCLOAK_ISSUER_BASE: ${BACKEND_KEYCLOAK_ISSUER_BASE}
      KEYCLOAK_INTERNAL_BASE: ${BACKEND_KEYCLOAK_INTERNAL_BASE}
      KEYCLOAK_ALLOWED_REALMS: ${BACKEND_KEYCLOAK_ALLOWED_REALMS}
      KEYCLOAK_EXPECTED_AUDIENCE: ${BACKEND_KEYCLOAK_EXPECTED_AUDIENCE}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_BOOTSTRAP_ADMIN_USERNAME}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_BOOTSTRAP_ADMIN_PASSWORD}
      KEYCLOAK_ADMIN_USERNAME: ${KC_BOOTSTRAP_ADMIN_USERNAME:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KC_BOOTSTRAP_ADMIN_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      MICADO_APP_PASSWORD: ${MICADO_APP_PASSWORD}
      PIPER_BASE_URL: http://piper:8080
      DATABASE_URL: postgres://${APP_DB_USER}:${MICADO_APP_PASSWORD}@db:5432/${POSTGRES_DB}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      FRONTEND_LOG_LEVEL: ${FRONTEND_LOG_LEVEL:-info}
      GITEA_BASE_URL: http://gitea:3000
      GITEA_TRANSLATIONS_OWNER: weblate-bot
      GITEA_TRANSLATIONS_REPO: translations
      GITEA_TRANSLATIONS_BRANCH: main
      GITEA_TOKEN_FILE: /bootstrap/gitea-weblate.token
      UMAMI_URL: http://umami:3000
      UMAMI_ADMIN_USERNAME: ${UMAMI_ADMIN_USERNAME:-admin}
      UMAMI_ADMIN_PASSWORD: ${UMAMI_ADMIN_PASSWORD:-umami}

      UMAMI_MIGRANTS_WEBSITE_ID: ${UMAMI_MIGRANTS_WEBSITE_ID:-11111111-1111-4111-8111-111111111111}
      UMAMI_PA_WEBSITE_ID: ${UMAMI_PA_WEBSITE_ID:-22222222-2222-4222-8222-222222222222}
      UMAMI_NGO_WEBSITE_ID: ${UMAMI_NGO_WEBSITE_ID:-33333333-3333-4333-8333-333333333333}

      UMAMI_MIGRANTS_NAME: ${UMAMI_MIGRANTS_NAME:-Migrants}
      UMAMI_PA_NAME: ${UMAMI_PA_NAME:-PA}
      UMAMI_NGO_NAME: ${UMAMI_NGO_NAME:-NGO}

      UMAMI_MIGRANTS_DOMAIN: migrants.${BASE_DOMAIN}
      UMAMI_PA_DOMAIN: pa.${BASE_DOMAIN}
      UMAMI_NGO_DOMAIN: ngo.${BASE_DOMAIN}
    labels:
      - traefik.enable=true
      - traefik.http.routers.backend.rule=Host(`api.${BASE_DOMAIN}`)
      - traefik.http.routers.backend.entrypoints=web
      - traefik.http.routers.backend.middlewares=sec-headers@file
      - traefik.http.services.backend.loadbalancer.server.port=${BACKEND_PORT}
    volumes:
      - bootstrap_data:/bootstrap
      - piper_audio:/audio

  migrants:
    build:
      context: ./apps/migrants
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: https://api.${BASE_DOMAIN}
        VITE_KEYCLOAK_URL: https://auth.${BASE_DOMAIN}
        VITE_KEYCLOAK_REALM: migrants
        VITE_KEYCLOAK_CLIENT_ID: migrants
    labels:
      - traefik.enable=true
      - traefik.http.routers.migrants.rule=Host(`migrants.${BASE_DOMAIN}`)
      - traefik.http.routers.migrants.entrypoints=web
      - traefik.http.routers.migrants.middlewares=sec-headers@file
      - traefik.http.services.migrants.loadbalancer.server.port=80

  pa_frontoffice:
    build:
      context: ./apps/pa_frontoffice
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: https://api.${BASE_DOMAIN}
        VITE_KEYCLOAK_URL: https://auth.${BASE_DOMAIN}
        VITE_KEYCLOAK_REALM: pa_frontoffice
        VITE_KEYCLOAK_CLIENT_ID: pa_frontoffice
    labels:
      - traefik.enable=true
      - traefik.http.routers.pa.rule=Host(`pa.${BASE_DOMAIN}`)
      - traefik.http.routers.pa.entrypoints=web
      - traefik.http.routers.pa.middlewares=sec-headers@file
      - traefik.http.services.pa.loadbalancer.server.port=80

  ngo_frontoffice:
    build:
      context: ./apps/ngo_frontoffice
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: https://api.${BASE_DOMAIN}
        VITE_KEYCLOAK_URL: https://auth.${BASE_DOMAIN}
        VITE_KEYCLOAK_REALM: ngo_frontoffice
        VITE_KEYCLOAK_CLIENT_ID: ngo_frontoffice
    labels:
      - traefik.enable=true
      - traefik.http.routers.ngo.rule=Host(`ngo.${BASE_DOMAIN}`)
      - traefik.http.routers.ngo.entrypoints=web
      - traefik.http.routers.ngo.middlewares=sec-headers@file
      - traefik.http.services.ngo.loadbalancer.server.port=80

  gitea:
    image: gitea/gitea:1.25.0
    depends_on:
      db:
        condition: service_healthy
    environment:
      GITEA__database__DB_TYPE: postgres
      GITEA__database__HOST: db:5432
      GITEA__database__NAME: ${POSTGRES_DB}
      GITEA__database__USER: ${GITEA_DB_USER}
      GITEA__database__PASSWD: ${GITEA_DB_PASSWORD}
      GITEA__server__DOMAIN: git.${BASE_DOMAIN}
      GITEA__server__ROOT_URL: http://git.${BASE_DOMAIN}/
      GITEA__database__SCHEMA: gitea
      GITEA__server__HTTP_PORT: 3000
      GITEA__security__INSTALL_LOCK: "true"
      GITEA__service__DISABLE_REGISTRATION: "true"

    volumes:
      - gitea_data:/data
    labels:
      - traefik.enable=true
      - traefik.http.routers.gitea.rule=Host(`git.${BASE_DOMAIN}`)
      - traefik.http.routers.gitea.entrypoints=web
      - traefik.http.routers.gitea.middlewares=sec-headers@file
      - traefik.http.services.gitea.loadbalancer.server.port=3000
    healthcheck:
      test:
        ["CMD-SHELL", "curl -fsS http://localhost:3000/api/healthz >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 20s

  bootstrap-perms:
    image: busybox:1.36
    user: "0:0"
    volumes:
      - bootstrap_data:/bootstrap
    entrypoint:
      - sh
      - -c
      - |
        set -eu
        mkdir -p /bootstrap
        chown -R 1000:1000 /bootstrap
        chmod 0770 /bootstrap
    restart: "no"

  gitea-init:
    image: gitea/gitea:1.25.0
    user: "1000:1000"
    depends_on:
      db:
        condition: service_healthy
      gitea:
        condition: service_healthy
      bootstrap-perms:
        condition: service_completed_successfully
    environment:
      USER_UID: "1000"
      USER_GID: "1000"
      GITEA_RUN_UID: "1000"
      GITEA_RUN_GID: "1000"
      GITEA__database__DB_TYPE: postgres
      GITEA__database__HOST: db:5432
      GITEA__database__NAME: ${POSTGRES_DB}
      GITEA__database__USER: ${GITEA_DB_USER}
      GITEA__database__PASSWD: ${GITEA_DB_PASSWORD}
      GITEA__database__SCHEMA: gitea
      GITEA__server__DOMAIN: git.${BASE_DOMAIN}
      GITEA__server__ROOT_URL: http://git.${BASE_DOMAIN}/
      GITEA__server__HTTP_PORT: 3000
      GITEA__security__INSTALL_LOCK: "true"
      MICADO_SOURCE_LANG: ${MICADO_SOURCE_LANG:-it}
      MICADO_CATEGORIES: ${MICADO_CATEGORIES:-information,event,categories}
      GITEA_TRANSLATIONS_REPO_PRIVATE: "false"
    volumes:
      - gitea_data:/data
      - ./infrastructure/gitea/init:/init:ro
      - bootstrap_data:/bootstrap
    entrypoint: ["bash", "/init/gitea-init.sh"]
    restart: "no"
    labels:
      - traefik.enable=false

  weblate:
    image: weblate/weblate:5.16.0.0
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
      gitea-init:
        condition: service_completed_successfully
      bootstrap-perms:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/healthz/ >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s
    environment:
      WEBLATE_SITE_DOMAIN: weblate.${BASE_DOMAIN}
      WEBLATE_ADMIN_NAME: ${WEBLATE_ADMIN_NAME:-Micado Weblate Admin}
      WEBLATE_ADMIN_PASSWORD: ${WEBLATE_ADMIN_PASSWORD:-weblate-admin}
      WEBLATE_ADMIN_EMAIL: ${WEBLATE_ADMIN_EMAIL:-weblate@example.com}
      POSTGRES_HOST: db
      POSTGRES_DATABASE: ${POSTGRES_DB}
      POSTGRES_USER: ${WEBLATE_DB_USER}
      POSTGRES_PASSWORD: ${WEBLATE_DB_PASSWORD}
      REDIS_HOST: cache
      WEBLATE_GIT_REPO: http://weblate-bot:${GITEA_WEBLATE_PASSWORD}@gitea:3000/weblate-bot/translations.git
      GIT_CONFIG_GLOBAL: /home/weblate/.gitconfig
      MICADO_TARGET_LANGS: ${MICADO_TARGET_LANGS:-it,fr,ar,de,sq,mk}   # your actual languages
      WEBLATE_GIT_PUSH_REPO: ""                    # empty = same as WEBLATE_GIT_REPO
    #      GIT_ALLOW_PROTOCOL: http:https
    #      GIT_CONFIG_COUNT: "1"
    #      GIT_CONFIG_KEY_0: protocol.http.allow
    #      GIT_CONFIG_VALUE_0: always
    volumes:
      - weblate_data:/app/data
      - bootstrap_data:/bootstrap:ro
      - ./infrastructure/weblate/config/settings-override.py:/app/data/settings-override.py:ro
    #      - ./infrastructure/weblate/config/gitconfig:/app/data/home/.gitconfig:ro
    labels:
      - traefik.enable=true
      - traefik.http.routers.weblate.rule=Host(`weblate.${BASE_DOMAIN}`)
      - traefik.http.routers.weblate.entrypoints=web
      - traefik.http.services.weblate.loadbalancer.server.port=8080

  weblate-init:
    image: weblate/weblate:5.16.0.0
    user: "1000:1000"
    depends_on:
      bootstrap-perms:
        condition: service_completed_successfully
      gitea-init:
        condition: service_completed_successfully
      weblate:
        condition: service_healthy
    environment:
      WEBLATE_SITE_DOMAIN: weblate.${BASE_DOMAIN}
      WEBLATE_ADMIN_NAME: ${WEBLATE_ADMIN_NAME:-Micado Weblate Admin}
      WEBLATE_ADMIN_PASSWORD: ${WEBLATE_ADMIN_PASSWORD:-weblate-admin}
      WEBLATE_ADMIN_EMAIL: ${WEBLATE_ADMIN_EMAIL:-weblate@example.com}
      POSTGRES_HOST: db
      POSTGRES_DATABASE: ${POSTGRES_DB}
      POSTGRES_USER: ${WEBLATE_DB_USER}
      POSTGRES_PASSWORD: ${WEBLATE_DB_PASSWORD}
      REDIS_HOST: cache
      WEBLATE_GIT_REPO: http://weblate-bot:${GITEA_WEBLATE_PASSWORD}@gitea:3000/weblate-bot/translations.git
      GIT_CONFIG_GLOBAL: /home/weblate/.gitconfig
      MICADO_SOURCE_LANG: ${MICADO_SOURCE_LANG:-it}
      MICADO_CATEGORIES: ${MICADO_CATEGORIES:-information,event,categories}
      #      GIT_ALLOW_PROTOCOL: http:https
      #      GIT_CONFIG_COUNT: "1"
      #      GIT_CONFIG_KEY_0: protocol.http.allow
      #      GIT_CONFIG_VALUE_0: always

      WEBLATE_URL: http://weblate:8080
      WEBLATE_PROJECT_NAME: micado
      WEBLATE_PROJECT_SLUG: micado
      WEBLATE_PROJECT_WEB: http://weblate.local
      WEBLATE_PROJECT_INSTRUCTIONS: Micado translation project bootstrap managed by Docker Compose.
      WEBLATE_IMPORT_COMPONENTS: "true"
      #      WEBLATE_GIT_REPO: http://gitea:3000/weblate-bot/translations.git
      WEBLATE_GIT_BRANCH: main
      WEBLATE_FILEMASK: backend/*.json
      WEBLATE_BASE_FILE_TEMPLATE: backend/en.json
      WEBLATE_FILE_FORMAT: json
      WEBLATE_NAME_TEMPLATE: Backend
      WEBLATE_WEBHOOK_URL: ${WEBLATE_WEBHOOK_URL:-http://backend:3000/api/webhooks/weblate/translation-complete}
      MICADO_TARGET_LANGS: ${MICADO_TARGET_LANGS:-it,fr,ar,de,sq,mk}   # your actual languages
      WEBLATE_GIT_PUSH_REPO: ""                    # empty = same as WEBLATE_GIT_REPO      BOOTSTRAP_DIR: /bootstrap
      WEBLATE_WEBHOOK_URL_COMMITTED: "http://backend:3000/api/webhooks/weblate/translation-committed"
      WEBLATE_WEBHOOK_URL_PUSHED:    "http://backend:3000/api/webhooks/weblate/translation-pushed"
      WEBLATE_WEBHOOK_SECRET: "bWljYWRvMjAyNm1pY2FkbzIwMjZtaWNhZG8yMDI2bWljYWRvMjAyNm1pY2FkbzIwMjY="          # set a base64 secret in production
      WEBLATE_WEBHOOK_EVENTS_COMMITTED: "17"   # default, no need to set explicitly
      WEBLATE_WEBHOOK_EVENTS_PUSHED:    "18"   # default, no need to set explicitly
      TOKEN_FILE: /bootstrap/gitea-weblate.token
    volumes:
      - weblate_data:/app/data
      - bootstrap_data:/bootstrap:ro
      - ./infrastructure/weblate/config/settings-override.py:/app/data/settings-override.py:ro
      - ./infrastructure/weblate/init:/init:ro
    #      - ./infrastructure/weblate/config/gitconfig:/app/data/home/.gitconfig:ro
    entrypoint: ["sh", "/init/weblate-init.sh"]
    restart: "no"

  piper:
    build:
      context: ./apps/piper
      dockerfile: Dockerfile
    environment:
      MODELS_DIR: /models
      OUTPUT_DIR: /audio
    volumes:
      - piper_models:/models
      - piper_audio:/audio
    labels:
      - traefik.enable=false
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 15s

  umami:
    image: docker.umami.is/umami-software/umami:postgresql-latest
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${UMAMI_DB_USER:-umami}:${UMAMI_DB_PASSWORD}@db:5432/${POSTGRES_DB}?schema=umami
      APP_SECRET: ${UMAMI_APP_SECRET}
      DISABLE_TELEMETRY: "1"
      DISABLE_UPDATES: "1"
      PRIVATE_MODE: "1"
      HOSTNAME: 0.0.0.0
      PORT: 3000
    labels:
      - traefik.enable=true
      - traefik.http.routers.umami.rule=Host(`analytics.${BASE_DOMAIN}`)
      - traefik.http.routers.umami.entrypoints=web
      - traefik.http.routers.umami.middlewares=sec-headers@file
      - traefik.http.services.umami.loadbalancer.server.port=3000
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000/api/heartbeat >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s

  umami-init:
    image: alpine:3.21
    depends_on:
      umami:
        condition: service_healthy
    environment:
      UMAMI_URL: http://umami:3000
      UMAMI_ADMIN_USERNAME: ${UMAMI_ADMIN_USERNAME:-admin}
      UMAMI_ADMIN_PASSWORD: ${UMAMI_ADMIN_PASSWORD:-umami}

      UMAMI_MIGRANTS_WEBSITE_ID: ${UMAMI_MIGRANTS_WEBSITE_ID:-11111111-1111-4111-8111-111111111111}
      UMAMI_PA_WEBSITE_ID: ${UMAMI_PA_WEBSITE_ID:-22222222-2222-4222-8222-222222222222}
      UMAMI_NGO_WEBSITE_ID: ${UMAMI_NGO_WEBSITE_ID:-33333333-3333-4333-8333-333333333333}

      UMAMI_MIGRANTS_NAME: ${UMAMI_MIGRANTS_NAME:-Migrants}
      UMAMI_PA_NAME: ${UMAMI_PA_NAME:-PA}
      UMAMI_NGO_NAME: ${UMAMI_NGO_NAME:-NGO}

      UMAMI_MIGRANTS_DOMAIN: migrants.${BASE_DOMAIN}
      UMAMI_PA_DOMAIN: pa.${BASE_DOMAIN}
      UMAMI_NGO_DOMAIN: ngo.${BASE_DOMAIN}
    volumes:
      - ./infrastructure/umami/init:/init:ro
    entrypoint: ["sh", "/init/umami-init.sh"]
    restart: "no"
    labels:
      - traefik.enable=false

volumes:
  db_data:
  cache_data:
  keycloak_data:
  gitea_data:
  weblate_data:
  bootstrap_data:
  piper_models:
  piper_audio: