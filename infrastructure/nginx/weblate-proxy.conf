# Opzionale: se vuoi mettere un Nginx davanti a Weblate (oltre a Traefik)
# In questo repo Weblate è già esposto tramite Traefik (reverse proxy).
server {
  listen 80;
  server_name _;

  location / {
    proxy_pass http://weblate:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
